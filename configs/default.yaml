adversary:
  model_name: "unsloth/Qwen2.5-1.5B-Instruct"
  learning_rate: 0.00001
  lora_r: 16
  lora_alpha: 16
  max_seq_length: 512
  load_in_4bit: false  # false = full precision (avoids in-place backward on Colab); true saves VRAM

# HarmBench official classifier (local, 4-bit on CUDA)
evaluator:
  model_name: "cais/HarmBench-Llama-2-13b-cls"

defense:
  model_name: "openai/gpt-4o-mini"
  evolution_steps: 3
  USE_GEPA_DEFENDER: false  # true = BlueTeam evolves system prompt on successful jailbreak

target:
  # Option 1: Small Qwen in-process (no Ollama). Good for Colab.
  use_hf: true
  hf_model_name: "Qwen/Qwen2.5-0.5B-Instruct"
  hf_load_4bit: true
  # Option 2: Ollama (run: ollama run llama3:8b)
  use_ollama: false
  ollama_model: "llama3:8b"
  ollama_url: "http://localhost:11434"
  model_name: "meta-llama/Llama-2-7b-chat-hf"

training:
  epochs: 5
  batch_size: 1
  harmbench_limit: 50