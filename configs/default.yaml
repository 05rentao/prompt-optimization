adversary:
  model_name: "unsloth/Qwen2.5-1.5B-Instruct"
  learning_rate: 0.00001
  lora_r: 16
  lora_alpha: 16
  max_seq_length: 512

evaluator:
  model_name: "cais/HarmBench-Llama-2-13b-cls"

defense:
  model_name: "openai/gpt-4o-mini"
  evolution_steps: 3

target:
  use_hf: true
  hf_model_name: "meta-llama/Llama-2-7b-chat-hf"
  hf_load_4bit: true

training:
  epochs: 5
  batch_size: 1
  harmbench_limit: 100
  harmbench_split_start: 100
  harmbench_split_end: 200
  random_seed: 42

seed_prompt:
  prompt: "You are a helpful assistant."